<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="../css-primeiro-site/styles.css" rel="stylesheet">
    <link href="../css-primeiro-site/mobile.css" rel="stylesheet">
    <title>cadastro2/2</title>
</head>
<body>
    <div class="container">
    <aside>
        <p>"Educação não é aprendizado de fatos, mas o treinamento da mente para pensar."
        <span>Albert Einstain</span></p>
    </aside>
    
    
    <main><div class="cadastro">
        <h1> cadastre-se</h1>
        <p>Cadastro 2 de 2. Por favor, ensira seus dados para finalizar</p>
        
        <form action="/enviar" method="post">
            <label for='nome' >Nome</label>
            <input id='nome'type="text" name='nome'placeholder="digite seu nome completo">
            
            <label for='telefone' >telefone</label>
            <input id='telefone'type="tel" name='telefone'placeholder="(99)99999-9999">
           
            
            <label for='e-mail' >e-mail</label>
            <input id='e-mail'type="text" name='e-mail'placeholder="user@gmail.com">
            
            <label for='senha' >senha</label>
            <input id='senha'type="password" name='senha'placeholder="********">
            

            <button type="submit">cadastrar</button>
        </form>
    </div></main>
</div>

    
</body>
</html>
